name: Build Release

on:
  push:
    tags:
      - 'v*'

env:
  BUILD_TYPE: Release
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup vcpkg cache
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Get current date
      id: date
      run: echo "date=$(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')" >> $env:GITHUB_OUTPUT
      shell: powershell

    - name: Download ONNX model
      run: |
        if (!(Test-Path "Marduk\crnn_model.onnx")) {
          Write-Host "ONNX Model Not Found"
        } else {
          Write-Host "ONNX Model Check Failed"
        }
      shell: powershell

    - name: Build project
      run: |
        echo "Building project..."
        msbuild Marduk.sln ^
          /p:Configuration=Release ^
          /p:Platform=x64 ^
          /verbosity:minimal ^
          /maxcpucount
        echo "Build finished."
      shell: cmd

    - name: Verify build outputs
      run: |
        $OutputDir = "bin\x64\Release"

        Write-Host "Checking build outputs..."
        if (Test-Path $OutputDir) {
          Get-ChildItem $OutputDir -Recurse | ForEach-Object {
            Write-Host "  - $($_.Name) ($($_.Length) bytes)"
          }
        } else {
          Write-Error "Build output directory not found: $OutputDir"
          exit 1
        }

        $RequiredFiles = @(
          "$OutputDir\Marduk.exe",
          "$OutputDir\ZfwInteractionDll.dll",
          "$OutputDir\DNSManagerDll.dll",
          "$OutputDir\NetworkDiagnosticDll.dll"
        )

        foreach ($file in $RequiredFiles) {
          if (!(Test-Path $file)) {
            Write-Error "Missing required file: $file"
            exit 1
          }
        }

        Write-Host "All required files present."
      shell: powershell

    - name: Collect runtime dependencies
      run: |
        $OutputDir = "bin\x64\Release"
        $VcpkgBinDir = "vcpkg_installed\x64-windows\bin"

        Write-Host "Collecting runtime dependencies..."

        if (Test-Path $VcpkgBinDir) {
          $DllFiles = Get-ChildItem "$VcpkgBinDir\*.dll"
          foreach ($dll in $DllFiles) {
            Copy-Item $dll.FullName -Destination $OutputDir -Force
            Write-Host "  - copied: $($dll.Name)"
          }
        } else {
          Write-Host "WARNING: vcpkg runtime directory not found: $VcpkgBinDir"
        }

        Write-Host "Dependency collection finished."
      shell: powershell

    - name: Create release package
      run: |
        $Version = "${{ github.ref_name }}"
        $PackageName = "Marduk-$Version-Windows-x64"
        $SourceDir = "bin\x64\Release"
        $PackageDir = $PackageName

        Write-Host "Creating release package: $PackageName"

        New-Item -ItemType Directory -Path $PackageDir -Force

        Copy-Item "$SourceDir\*" -Destination $PackageDir -Recurse -Force

        Copy-Item "README.md" -Destination "$PackageDir\README.md" -ErrorAction SilentlyContinue
        Copy-Item "LICENCE.txt" -Destination "$PackageDir\LICENCE.txt" -ErrorAction SilentlyContinue

        @"
        Marduk - Network Diagonize Toolkit
        Version: $Version
        Compile Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
        Compile Env: GitHub Actions (windows-2025-vs2026)
        Arch: x64

        Usage:
        1. run Marduk.exe with Administrator
        2. Type 'help' to show all supported commands
        3. Recommand routes: login -> diagno -> pasopt

        Tech Support: NanCunChild
        "@ | Out-File -FilePath "$PackageDir\VERSION.txt" -Encoding UTF8

        Compress-Archive -Path $PackageDir -DestinationPath "$PackageName.zip" -Force

        Write-Host "Create GitHub Release: $PackageName.zip"

        "PACKAGE_NAME=$PackageName" | Out-File -FilePath $env:GITHUB_ENV -Append
        "PACKAGE_FILE=$PackageName.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: powershell

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}
        path: ${{ env.PACKAGE_FILE }}
        retention-days: 90

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "Marduk ${{ github.ref_name }}"
        body: |
          # Marduk ${{ github.ref_name }} - Network Diagonizer in Xidian

          ## New Version Released

          **Release Time**: ${{ steps.date.outputs.date }}
          **Compile Env**: GitHub Actions (Windows + MSVC)
          **Arch**: Windows x64

          ## Download

          - **Full Version**: `Marduk-${{ github.ref_name }}-Windows-x64.zip` 
            - All dependencies included

          ## Quick Start

          1. Download and unzip `Marduk-${{ github.ref_name }}-Windows-x64.zip`
          2. Run `Marduk.exe` with Administrator
          3. Type `help` to show all supported commands
          4. Recommand routes：`login` -> `diagno` -> `pasopt`

          ## System Requirements

          - Windows 10/11 (x64)
          - Microsoft Visual C++ Redistributable

          ## Tech Info

          - **C++ **: C++17
          - **Package Manage**: vcpkg (manifest mode)
          - **Dependencies**: OpenCV, ONNX Runtime, CPR, Crypto++

          ---

          **Developed by NCC**
        files: ${{ env.PACKAGE_FILE }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
